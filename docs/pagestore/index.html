<!DOCTYPE html
	PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="manifest" href="manifest.json" crossorigin="use-credentials">
	<link rel="stylesheet" href="pagestore.css">
	<script src="common/storage.js"></script>
	<script src="common/menu.js"></script>
	<script src="common.js"></script>
	<script src="version.js"></script>
	<script>
		let swCacheName;
		try {
			console.clear();
			if ('serviceWorker' in navigator && (location.protocol === "https:" || location.hostname === "localhost")) {
				window.addEventListener("load", () => {
					navigator.serviceWorker.register('sw.js')
						.then(reg => {
							console.log("Service worker registered");
							navigator.serviceWorker.addEventListener("message", (event) => {
								if (event.type == "message") {
									if (event.data.name) {
										swCacheName = event.data.name;
										if (swCacheName !== cacheName) {
											reg.update();
											console.log(swCacheName, cacheName, "Service worker updated");
										}
									}
								}
							});
						})
						.catch(err => console.error(`Service Worker Error: ${err}`));
				});
			}
		} catch (e) {
			console.error(e);
		}		
	</script>
</head>

<body>
	<br><br>Store page links on your mobile phone.
	<br><br>
	<script>
		if (window.matchMedia('(display-mode: standalone)').matches) {
			document.body.innerHTML += "The app is installed";
			if (location.hash != "#here") {
				location.href = "pagestore.html";
			}
		} else {
			document.body.innerHTML += "** Use the page options to install this web app **<br>It won't work until you do.";
		}
	</script>
	<br><br>To add a page use the browser Share option
	<br><br>
	<br><br>Version 
	<script>
		console.clear();
		console.log(location.href);
		const page = {};
		const all = document.querySelectorAll("*[id]");
		all.forEach((val) => {
			page[val.id] = val;
		});

		let storage = new CbStorage("pagestore");
		menuStorage = storage;

		let ver = document.createTextNode(cacheName);
		document.body.appendChild(ver);


	</script>
</body>

</html>
